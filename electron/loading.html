<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F8FAFC; color: #0F172A;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    user-select: none;
  }
  .icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 28px rgba(79,70,229,.35);
    animation: float 2.4s ease-in-out infinite;
  }
  .icon svg { fill: white; }
  .title { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
  .steps { display: flex; flex-direction: column; gap: 10px; width: 240px; }
  .step {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #CBD5E1; transition: color .3s;
  }
  .step.active { color: #4F46E5; }
  .step.done   { color: #10B981; }
  .step-indicator {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid #CBD5E1; display: flex; align-items: center;
    justify-content: center; transition: border-color .3s, background .3s;
  }
  .step.active .step-indicator {
    border-color: #4F46E5; background: transparent;
  }
  .step.active .step-indicator::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #4F46E5; animation: pulse 1s ease-in-out infinite;
  }
  .step.done .step-indicator {
    border-color: #10B981; background: #10B981;
  }
  .step.done .step-indicator::after {
    content: ''; width: 5px; height: 3px;
    border-left: 1.5px solid white; border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
  <div class="icon">
    <svg width="34" height="34" viewBox="0 0 24 24">
      <path d="M12 1L14.7 8.3L22 11L14.7 13.7L12 21L9.3 13.7L2 11L9.3 8.3L12 1Z"/>
      <path d="M19.5 2.5L20.5 5.5L23.5 6.5L20.5 7.5L19.5 10.5L18.5 7.5L15.5 6.5L18.5 5.5L19.5 2.5Z" opacity=".6"/>
    </svg>
  </div>
  <div class="title">AI Studio</div>
  <div class="steps">
    <div class="step" id="s0"><div class="step-indicator"></div><span>检查运行环境</span></div>
    <div class="step" id="s1"><div class="step-indicator"></div><span>初始化数据目录</span></div>
    <div class="step" id="s2"><div class="step-indicator"></div><span>启动 AI 服务</span></div>
    <div class="step" id="s3"><div class="step-indicator"></div><span>等待服务就绪</span></div>
  </div>
</body>
<script>
  function updateStep(index) {
    document.querySelectorAll('.step').forEach((el, i) => {
      el.classList.remove('active', 'done');
      if (i < index) el.classList.add('done');
      else if (i === index) el.classList.add('active');
    });
  }
  updateStep(0);
</script>
</html>
