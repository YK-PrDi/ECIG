# 生产环境只从 systemd 的 EnvironmentFile 读取密钥，禁止在代码包中提供真实回退值。
spring:
  session:
    store-type: redis
  data:
    redis:
      host: "${REDIS_HOST:127.0.0.1}"
      port: "${REDIS_PORT:6379}"

app:
  gemini:
    api-key: "${GEMINI_API_KEY:}"
    base-url: "${GEMINI_BASE_URL:https://api.linapi.net}"
    image-base-url: "${GEMINI_IMAGE_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models/}"
    model: "${GEMINI_MODEL:gemini-3.1-flash-image-preview}"

  qwen:
    api-key: "${QWEN_API_KEY:}"
    model: "${QWEN_MODEL:qwen-vl-max}"

  gpt-image:
    api-keys:
      - "${GPT_IMAGE_KEY_1:}"
      - "${GPT_IMAGE_KEY_2:}"
      - "${GPT_IMAGE_KEY_3:}"
      - "${GPT_IMAGE_KEY_4:}"
    base-url: "${GPT_IMAGE_BASE_URL:https://api.linapi.net}"

  dashscope:
    api-key: "${DASHSCOPE_API_KEY:}"
    model: "${DASHSCOPE_MODEL:wan2.7-image-pro}"
    image-size: "${DASHSCOPE_IMAGE_SIZE:1024*1024}"

  siliconflow:
    api-key: "${SILICONFLOW_API_KEY:}"
    model: "${SILICONFLOW_MODEL:hy-image-v3.0}"

  volcengine:
    api-key: "${VOLCENGINE_API_KEY:}"
    base-url: "${VOLCENGINE_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}"
    model: "${VOLCENGINE_MODEL:doubao-seedance-2-0-260128}"

  suixiang-video:
    base-url: "${SUIXIANG_VIDEO_BASE_URL:https://sui-xiang.com/v1}"
    grok:
      api-key: "${SUIXIANG_GROK_VIDEO_API_KEY:}"
    jimeng:
      api-key: "${SUIXIANG_JIMENG_VIDEO_API_KEY:}"
    media-proxy:
      enabled: "${SUIXIANG_MEDIA_PROXY_ENABLED:false}"
      type: "${SUIXIANG_MEDIA_PROXY_TYPE:socks5}"
      host: "${SUIXIANG_MEDIA_PROXY_HOST:127.0.0.1}"
      port: "${SUIXIANG_MEDIA_PROXY_PORT:40000}"
      hosts: "${SUIXIANG_MEDIA_PROXY_HOSTS:vidgen.x.ai}"

  cos:
    secret-id: "${COS_SECRET_ID:}"
    secret-key: "${COS_SECRET_KEY:}"
    region: "${COS_REGION:ap-guangzhou}"
    bucket: "${COS_BUCKET:graduation-project-1416091844}"

  civitai:
    api-key: "${CIVITAI_API_KEY:}"
    model: "${CIVITAI_MODEL:sdxl}"
    max-poll-seconds: "${CIVITAI_MAX_POLL_SECONDS:300}"

  liblib:
    access-key: "${LIBLIB_ACCESS_KEY:}"
    secret-key: "${LIBLIB_SECRET_KEY:}"
    base-url: "${LIBLIB_BASE_URL:https://openapi.liblibai.cloud}"
    model: "${LIBLIB_MODEL:sdxl}"
    lora-model-id: "${LIBLIB_LORA_MODEL_ID:8aef8e5223a14c1a8808bebdcf128c46}"
    template-uuid: "${LIBLIB_TEMPLATE_UUID:}"
    text-to-image-template-uuid: "${LIBLIB_TEXT_TO_IMAGE_TEMPLATE_UUID:6f7c4652458d4802969f8d089cf5b91f}"
    image-to-image-template-uuid: "${LIBLIB_IMAGE_TO_IMAGE_TEMPLATE_UUID:63b72710c9574457ba303d9d9b8df8bd}"
    checkpoint-id: "${LIBLIB_CHECKPOINT_ID:412b427ddb674b4dbab9e5abd5ae6057}"

  auth:
    username: "${APP_USERNAME:admin}"
    password: "${APP_PASSWORD:}"

  billing:
    callback-token: "${BILLING_CALLBACK_TOKEN:}"
    credential-secret: "${BILLING_CREDENTIAL_SECRET:}"
